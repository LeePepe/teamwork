name: review
description: Review-only flow using final-reviewer coalition on existing code or PRs
max_pipeline_steps: 8
max_review_loops: 3
red_behavior: halt
nodes:
  - id: research
    type: discussion
    label: "Research"
  - id: final-review
    type: review
    label: "Final Review Coalition"
    max_cycles: 3
  - id: verdict
    type: gate
    label: "Verdict"
edges:
  - from: research
    to: final-review
  - from: final-review
    to: verdict
