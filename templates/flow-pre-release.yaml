name: pre-release
description: Pre-release flow with security and performance review gates
max_pipeline_steps: 20
max_review_loops: 3
red_behavior: halt
nodes:
  - id: research
    type: discussion
    label: "Research"
  - id: plan
    type: build
    label: "Plan"
  - id: plan-review
    type: review
    label: "Plan Review"
    max_cycles: 3
  - id: execute
    type: execute
    label: "Execute"
  - id: verify
    type: gate
    label: "Verify"
  - id: security-review
    type: review
    label: "Security Review"
  - id: perf-review
    type: review
    label: "Perf Review"
  - id: final-review
    type: review
    label: "Final Review"
  - id: ship
    type: gate
    label: "Ship"
edges:
  - from: research
    to: plan
  - from: plan
    to: plan-review
  - from: plan-review
    to: execute
  - from: execute
    to: verify
  - from: verify
    to: security-review
    condition: "green"
  - from: verify
    to: execute
    condition: "yellow"
    max_cycles: 1
  - from: security-review
    to: perf-review
  - from: perf-review
    to: final-review
  - from: final-review
    to: ship
    condition: "green"
  - from: final-review
    to: execute
    condition: "yellow"
    max_cycles: 1
