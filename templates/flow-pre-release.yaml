name: pre-release
description: Pre-release flow with stricter PM, final coalition gates, and mandatory user-perspective gate
max_pipeline_steps: 22
max_review_loops: 3
red_behavior: halt
nodes:
  - id: plan
    type: build
    label: "Plan (Plan-Lead)"
  - id: plan-review
    type: review
    label: "Plan Gate (Tech+PM)"
    max_cycles: 3
  - id: execute
    type: execute
    label: "Execute"
  - id: verify
    type: gate
    label: "Verify"
  - id: pm-review
    type: review
    label: "PM Delivery Gate"
    max_cycles: 2
  - id: final-review
    type: review
    label: "Final Review Coalition"
    max_cycles: 2
  - id: user-perspective
    type: review
    label: "User Perspective Gate"
    max_cycles: 2
  - id: ship
    type: gate
    label: "Ship"
edges:
  - from: plan
    to: plan-review
  - from: plan-review
    to: execute
    condition: "green"
  - from: plan-review
    to: plan
    condition: "yellow"
    max_cycles: 2
  - from: execute
    to: verify
  - from: verify
    to: pm-review
    condition: "green"
  - from: verify
    to: execute
    condition: "yellow"
    max_cycles: 1
  - from: pm-review
    to: final-review
    condition: "green"
  - from: pm-review
    to: execute
    condition: "yellow"
    max_cycles: 1
  - from: final-review
    to: user-perspective
    condition: "green"
  - from: final-review
    to: execute
    condition: "yellow"
    max_cycles: 1
  - from: user-perspective
    to: ship
    condition: "green"
  - from: user-perspective
    to: execute
    condition: "yellow"
    max_cycles: 1
